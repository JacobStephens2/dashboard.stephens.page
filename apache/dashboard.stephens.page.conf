<VirtualHost *:80>
    ServerName dashboard.stephens.page

    ProxyPreserveHost On
    ProxyPass /        http://127.0.0.1:3460/
    ProxyPassReverse / http://127.0.0.1:3460/

    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Port  "80"

    ErrorLog ${APACHE_LOG_DIR}/dashboard.stephens.page-error.log
    CustomLog ${APACHE_LOG_DIR}/dashboard.stephens.page-access.log combined
</VirtualHost>
